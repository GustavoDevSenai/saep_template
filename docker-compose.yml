version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_backend
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: meu_banco_nestjs
      MYSQL_ROOT_PASSWORD: senha_supresa_root
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - DB_HOST=db             # <-- O host é o nome do serviço do MySQL no docker-compose
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=senha_supresa_root
      - DB_NAME=meu_banco_nestjs
    depends_on:
      - db                     

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

# Volume nomeado para não perder os dados do banco quando o container reiniciar
volumes:
  mysql_data: